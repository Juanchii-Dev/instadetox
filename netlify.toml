# ============================================================================
# INSTADETOX - NETLIFY CONFIGURATION
# Configuración para deploy del frontend (React + Vite)
# IMPORTANTE: Este proyecto usa un backend separado (Express/Node.js)
# que debe deployarse en otro servicio (Railway, Render, VPS, etc.)
# ============================================================================

[build]
  # Comando de build: Solo compilamos el cliente (frontend)
  # El backend no puede correr en Netlify sin adaptarlo a Functions
  command = "npm --prefix client install && npm --prefix client run build"
  
  # Directorio de salida del build (según client/vite.config.ts outDir)
  # El cliente compila a ../dist/client desde la carpeta client/
  # Desde root: dist/client/
  publish = "dist/client"
  
  # NOTA: Las funciones serverless están deshabilitadas porque
  # el backend es Express tradicional, no serverless functions
  # functions = "netlify/functions"

[build.environment]
  # Node.js version - Usar LTS estable
  NODE_VERSION = "20"
  
  # NPM version
  NPM_VERSION = "10"
  
  # Asegurar que estemos en modo producción
  NODE_ENV = "production"
  
  # IMPORTANTE: Instalar devDependencies (Vite está en devDependencies)
  # Netlify corre npm install en modo producción por defecto, que ignora devDependencies
  NPM_CONFIG_PRODUCTION = "false"

# ============================================================================
# REDIRECTS - SPA Support
# ============================================================================

# IMPORTANTE: Las llamadas a /api deben apuntar a tu backend externo
# Configura VITE_API_URL en las variables de entorno de Netlify
# Ejemplo: VITE_API_URL=https://tu-api.railway.app

# Redirección para SPA (Single Page Application)
# Todas las rutas no encontradas van al index.html
# Esto permite que React Router maneje el routing client-side
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  
# NOTA: Redirecciones de API removidas porque el backend es externo
# El frontend debe usar la URL del backend configurada en VITE_API_URL

# ============================================================================
# HEADERS - Security Headers
# ============================================================================

# Headers de seguridad para todas las rutas
[[headers]]
  for = "/*"
  [headers.values]
    # Prevenir clickjacking
    X-Frame-Options = "DENY"
    
    # Prevenir MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Política de referrer
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Política de permisos
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=(), usb=(), magnetometer=(), gyroscope=()"
    
    # Content Security Policy (Production-Ready)
    # IMPORTANTE: Reemplazar https://instadetox-api.onrender.com con tu URL real de Render
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://instagram.com https://*.instagram.com https://*.fbcdn.net https://images.unsplash.com; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co wss://*.supabase.in https://*.onrender.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    
    # Strict Transport Security (HSTS) - Solo en producción
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Headers específicos para assets estáticos (caché)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================================
# CONTEXT-SPECIFIC SETTINGS
# ============================================================================

# Configuración para deploys de producción
[context.production]
  [context.production.environment]
    NODE_ENV = "production"

# Configuración para deploy previews
[context.deploy-preview]
  [context.deploy-preview.environment]
    NODE_ENV = "production"

# Configuración para branch deploys
[context.branch-deploy]
  [context.branch-deploy.environment]
    NODE_ENV = "production"

# ============================================================================
# PLUGINS
# ============================================================================

# NOTA: No se usan plugins adicionales para React + Vite
# El plugin de Next.js fue removido porque este proyecto usa React puro con Vite
# [[plugins]]
#   package = "@netlify/plugin-nextjs"

# ============================================================================
# EDGE FUNCTIONS (Opcional - deshabilitado)
# ============================================================================

# Las Edge Functions están deshabilitadas porque el backend es Express tradicional
# Si necesitas redirecciones avanzadas, puedes habilitarlas más adelante
# [[edge_functions]]
#   function = "geo-redirect"
#   path = "/"
